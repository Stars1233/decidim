on:
  workflow_call:
    inputs:
      ruby_version:
        description: 'Ruby Version'
        default: "3.4.7"
        required: false
        type: string
      working-directory:
        required: true
        type: string
      test_command:
        description: 'The testing command to be ran'
        required: true
        type: string
      bullet_enabled:
        description: 'Enable bullet performance testing'
        required: false
        default: true
        type: boolean
      bullet_n_plus_one:
        description: 'Enable bullet n+1 testing'
        required: false
        default: true
        type: boolean
      bullet_counter_cache:
        description: 'Enable bullet counter cache testing'
        required: false
        default: false
        type: boolean
      # We prefer to disable this check instead of having to create more associations during the tests/seeds that
      # would make the testing/seeding performance worse
      bullet_unused_eager_loading:
        description: 'Enable bullet unused eager loading testing'
        required: false
        default: false
        type: boolean
      chrome_version:
        description: 'Chrome & Chromedriver version'
        required: false
        default: "139.0.7258.66"
        type: string

jobs:
  build_app:
    name: Test
    runs-on: ubuntu-22.04
    if: "!startsWith(github.head_ref, 'chore/l10n')"
    timeout-minutes: 60
    env:
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DECIDIM_SPAM_DETECTION_BACKEND_RESOURCE: "memory"
      DECIDIM_SPAM_DETECTION_BACKEND_USER: "memory"
      PARALLEL_TEST_PROCESSORS: 3
    services:
      # If you see any inconsistency between CI and local testing environment related to the accessibility validator, the best way of troubleshooting is:
      # 1. Go to the "Raw log" of the failing action
      # 2. Search for the version of the validator in the line
      # > Status: Downloaded newer image for ghcr.io/validator/validator@XXX
      # Example:
      # > Status: Downloaded newer image for ghcr.io/validator/validator@sha256:238afea6aed5f057e90c4c3ed2b40fa1e3646d16773cdddfb2f069dc265b111b
      # 3. Copy the version
      # 4. Run it with docker locally
      # ```
      # docker run --rm -p 8888:8888 ghcr.io/validator/validator@sha256:238afea6aed5f057e90c4c3ed2b40fa1e3646d16773cdddfb2f069dc265b111b
      # ```
      # 5. Run the failing spec with the VALIDATOR_HTML_URI environment variable
      # ```
      # VALIDATOR_HTML_URI=http://127.0.0.1:8888/ CI=true bin/rspec decidim-proposals/spec/system/proposals_spec.rb -e "accessible page"
      # ```
      #
      # Mind that we could not be using the latest version because there was some problem upstream (new rules, or just a bad release).
      validator:
        image: ${{ vars.ACTION_ACCESSIBILITY_VALIDATOR_VERSION || 'ghcr.io/validator/validator:latest' }}
        ports: ["8888:8888"]
      postgres:
        image: postgres:14
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          sudo apt-get update && sudo apt-get install libvips libvips-tools
        name: Install libvips
        shell: "bash"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ./package-lock.json
      - run: npm config set fetch-retries 5 && npm config set fetch-retry-mintimeout 20000 && npm config set fetch-retry-maxtimeout 120000
        name: Tune NPM configuration
        shell: "bash"
      - run: |
          sudo apt update
          sudo apt install libu2f-udev
          wget --no-verbose -O /tmp/chrome.deb https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_${{inputs.chrome_version}}-1_amd64.deb
          sudo dpkg -i /tmp/chrome.deb
          rm /tmp/chrome.deb
      - uses: nanasess/setup-chromedriver@v3
        with:
          chromedriver-version: ${{inputs.chrome_version}}
        name: Install Chrome version ${{inputs.chrome_version}}
      - run: bundle exec brakeman --rails7 --force-scan .
        name: Scanning Security issues on module
        working-directory: ${{ inputs.working-directory }}
        shell: "bash"
      - run: bundle exec rake test_app
        name: Create test app
        shell: "bash"
      - run: mkdir -p ./spec/decidim_dummy_app/tmp/screenshots
        name: Create the screenshots folder
        shell: "bash"
      - run: |
          bundle install
          bundle exec rake parallel:create parallel:load_schema
        name: Parallel tests
        shell: "bash"
        working-directory: ./spec/decidim_dummy_app/
      - run: |
          sudo Xvfb -ac $DISPLAY -screen 0 1920x1084x24 > /dev/null 2>&1 & # optional
          ${{ inputs.test_command }}
        name: RSpec
        working-directory: ${{ inputs.working-directory }}
        env:
          VALIDATOR_HTML_URI: http://localhost:8888/
          RUBY_VERSION: ${{ inputs.ruby_version }}
          DECIDIM_MODULE: ${{ inputs.working-directory }}
          DECIDIM_BULLET_ENABLED: ${{ inputs.bullet_enabled }}
          DECIDIM_BULLET_N_PLUS_ONE: ${{ inputs.bullet_n_plus_one }}
          DECIDIM_BULLET_COUNTER_CACHE: ${{ inputs.bullet_counter_cache }}
          DECIDIM_BULLET_UNUSED_EAGER: ${{ inputs.bullet_unused_eager_loading }}
          DISPLAY: ":99"
          CI: "true"
          SIMPLECOV: "true"
          SHAKAPACKER_RUNTIME_COMPILE: "false"
          NODE_ENV: "test"
      - uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{secrets.QLTY_COVERAGE_TOKEN}}
          files: coverage/coverage.json
          verbose: true
          add-prefix: ${{ env.DECIDIM_MODULE }}
      - uses: codecov/codecov-action@v7
        name: Upload coverage
        with:
          name: ${{ inputs.working-directory }}
          flags: ${{ inputs.working-directory }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Screenshots of run ${{ github.run_id }}
          path: ./spec/decidim_dummy_app/tmp/screenshots
          if-no-files-found: ignore
          overwrite: true
