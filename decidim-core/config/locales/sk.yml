        body_2_html: V rámci nášho úsilia o zjednodušenie a zlepšenie prostredia pre organizácie, ako je tá vaša, rušíme funkciu „Používateľské skupiny“. Vaša skupina, <strong>%{name}</strong>, bola skonvertovaná na bežný účet.
        body_3_html: Ak chcete naďalej pristupovať k svojmu účtu a zdieľať prístup, musíte si nastaviť nový e-mail a heslo. Upozorňujeme, že tento e-mail dostane každý člen vašej skupiny. Na zabezpečenie nepretržitého prístupu sa budete musieť interne dohodnúť na zdieľaných prihlasovacích údajoch (e-mail a heslo), ktoré budú všetci používať.
