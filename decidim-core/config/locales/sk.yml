      index:
        description: Vitajte na stránke otvorených dát %{organization_name}. Tu nájdete dátové súbory, ktoré sa pravidelne generujú z rôznych deliberatívnych a riadiacich procesov v rámci %{organization_name}. Tieto súbory sú sprístupnené na podporu transparentnosti, dostupnosti a spolupráce. Nižšie nájdete podrobné informácie o tom, čo sú tieto súbory, ako ich otvoriť a pracovať s nimi, a popis obsahu a štruktúry každého súboru.
        detailed:
          body_1: 'Nižšie je uvedený popis každého súboru dát vrátane jeho schémy (štruktúry) a typu informácií, ktoré obsahuje:'
          components: Komponenty
          spaces: Participatívne priestory
          title: Podrobné vysvetlenie každého súboru
        download:
          components: Komponenty
          core: Jadro
          spaces: Participatívne priestory
          title: Stiahnuť zdroje
        download_open_data: Stiahnuť všetky súbory otvorených dát
        download_resource: Stiahnuť %{resource_name} vo formáte CSV
        explanation:
          body_1: Tieto súbory sú dátové sady exportované z participatívnych procesov %{organization_name}, ako sú návrhy, komentáre a stretnutia. Poskytujú nespracované, štruktúrované údaje, ktoré možno použiť na analýzu, výskum alebo integráciu s inými nástrojmi. Údaje sa automaticky aktualizujú každých 24 hodín, čím sa zabezpečí, že budete mať prístup k najnovším informáciám.
          body_2: Tieto súbory sú vo formáte CSV (hodnoty oddelené čiarkou), čo je široko používaný formát súborov, ktorý možno otvoriť a spracovať pomocou rôznych softvérových aplikácií vrátane tabuľkových procesorov, textových editorov a nástrojov na analýzu údajov.
          title: Čo sú tieto súbory?
        how_to:
          step_1:
            body_html: Kliknutím na nižšie uvedené odkazy si stiahnete súbory CSV do svojho počítača.
            title: 1. Stiahnite si súbory
          step_2:
            body_html: |-
              <ul>
              <li><b>Tabuľkové procesory</b>: Súbory CSV môžete otvoriť pomocou aplikácií ako Microsoft Excel, Google Sheets alebo LibreOffice Calc. Jednoducho otvorte aplikáciu, potom v ponuke Súbor vyberte možnosť „Otvoriť“ a vyberte stiahnutý súbor CSV.</li>
              <li><b>Textové editory</b>: Súbory CSV možno otvoriť aj v akomkoľvek textovom editore, ako je napríklad Poznámkový blok alebo Sublime Text. Zobrazia sa nespracované údaje, pričom každý riadok predstavuje jeden záznam a každá hodnota je oddelená čiarkou.</li>
              <li><b>Nástroje na analýzu údajov</b>: Ak poznáte nástroje na analýzu údajov, ako je Python (s knižnicou pandas), R alebo databázy SQL, môžete tieto súbory CSV importovať priamo na spracovanie a analýzu.</li>
              </ul>
            title: 2. Otvorte súbory
          step_3:
            body_html: |-
              <ul>
              <li><b>Filtrovanie a triedenie</b>: V tabuľkových procesoroch môžete údaje filtrovať a triediť, aby ste sa zamerali na konkrétne podmnožiny informácií.</li>
              <li><b>Analýza</b>: Údaje môžete použiť na vykonávanie rôznych analýz, ako je napríklad počítanie návrhov, analýza trendov v komentároch alebo hodnotenie účasti na stretnutiach.</li>
              <li><b>Vizualizácia</b>: Môžete vytvárať grafy, diagramy a iné vizualizácie, ktoré pomôžu interpretovať údaje.</li>
              </ul>
            title: 3. Práca s údajmi
          title: Ako otvoriť a pracovať s týmito súbormi
        license:
          body_1_html: Táto databáza %{organization_name} je sprístupnená pod %{link_database}. Akékoľvek práva na jednotlivý obsah databázy sú licencované pod %{link_contents}.
          license_contents_link: https://opendatacommons.org/licenses/dbcl/1.0/
          license_contents_name: Licencia na obsah databázy (Database Contents License)
          license_database_link: https://opendatacommons.org/licenses/odbl/1.0/
          license_database_name: Licencia na otvorenú databázu (Open Database License)
          title: Licencia
        title: Otvorené dáta
