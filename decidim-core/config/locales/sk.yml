        body_2: V rámci nášho úsilia o zjednodušenie a zlepšenie prostredia pre organizácie, ako je tá vaša, rušíme funkciu „Používateľské skupiny“. Vaša skupina, <strong>%{name}</strong>, bola skonvertovaná na bežný účet.
        body_3: Ak chcete naďalej pristupovať k svojmu účtu a zdieľať prístup, musíte si nastaviť heslo. Po nastavení môžete prihlasovacie údaje (e-mail a heslo) zdieľať s kýmkoľvek.
