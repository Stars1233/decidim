                <li><b>Υπερκατηγορία/id:</b> ID για την υπερκατηγορία(για συναφή αποτελέσματα). Προαιρετικό</li>
                <li><b>Τίτλος/en:</b> Τίτλος στην Αγγλική γλώσσα. Αυτό θα εξαρτηθεί από τις ρυθμίσεις της γλώσσας της πλατφόρμας σας.</li>
