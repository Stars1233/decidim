            default_hint: Aceste tipuri MIME sunt permise implicit pentru toți utilizatorii.
            intro_html: Adaugă metacaractere cu caracterul asterisc pentru tipurile MIME, ex. <code>image/*</code>.
            title: Tipuri MIME permise
