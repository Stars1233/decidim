                options:
                  five: 'Ano'
                  two_five: Částečně
                  zero: 'Ne'
            informativeness:
              information_provided:
                legend: Byly poskytnuty informace o schopnosti účastníků ovlivnit projednávané téma? (jak ve sdělení procesu a pozvání, tak na začátku každého zasedání rozpravy)
                options:
                  five: Vždy
                  one: Téměř nikdy
                  two_five: Obvykle
                  zero: Nikdy
              name: Informativita
              published_information_clarity:
                legend: Poskytují zveřejněné informace jasné informace o rozhodovacích mechanismech? (např. hlasování, konsensus, přímá jednání)
                options:
                  five: Úpln jasné
                  one: Málo jasné
                  two_five: Dostatečně jasné
                  zero: Nejasné
