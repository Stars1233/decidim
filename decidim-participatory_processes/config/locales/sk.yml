      static_pages:
        democratic_quality_indicators:
          content: |-
            <h2>Systém indikátorov na meranie indikátora kvality v Decidim.</h2>

            <h3>Úvod</h3>
            <p>Demokratická kvalita je základným princípom Decidim. Na jej udržanie sme vyvinuli systém indikátorov, ktoré pomáhajú hodnotiť kvalitu participatívnych procesov na platforme. Tento článok vysvetľuje, ako sa tieto indikátory počítajú.</p>

            <h3>Ako sa počítajú indikátory?</h3>
            <p>Definovali sme dve metódy zberu indikátorov kvality:</p>

            <ol>
            <li><strong>Automatické metriky:</strong> Tieto sa počítajú priamo z údajov platformy Decidim.</li>
            <li><strong>Otázky sebahodnotenia:</strong> Tieto sú založené na formulári, ktorý vyplní administrátor.</li>
            </ol>

            <p>Každý indikátor je vyjadrený v percentách (n/celkom). Toto percento sa potom prevedie na skóre na stupnici od 1 do 5:</p>

            <ul>
            <li>1 = 0–20%</li>
            <li>2 = 20–40%</li>
            <li>3 = 40–60%</li>
            <li>4 = 60–80%</li>
            <li>5 = 80–100%</li>
            </ul>

            <br><br>
            <h3>Automatické metriky</h3>
            <p>Tieto metriky sa automaticky počítajú z údajov dostupných v Decidim. Hodnotia sa pre každý participatívny proces a administrátori ich môžu zverejniť, aby k nim mali prístup všetci účastníci.</p>

            <p>Definovali sme štyri hlavné indikátory: Vplyv občanov, Hybridizácia, Reakcieschopnosť a Sledovateľnosť:</p>

            <h3>Vplyv občanov</h3>

            <p>Tento indikátor meria úroveň vplyvu občanov na prijaté návrhy a výsledky procesu.</p>

            <ul>
            <li>
            Vplyv občanov na návrhy
            <ul>
            <li>Percento prijatých návrhov (n/celkom)</li>
            <li>Percento schválených <em>občianskych</em> návrhov z celkového počtu občianskych návrhov (celkový vplyv občanov na schválené návrhy)</li>
            <li>Percento schválených občianskych návrhov z celkového počtu schválených návrhov (relatívny vplyv občanov na schválený návrh)</li>
            </ul>
            </li>
            <li>
            Vplyv občanov na výstupy/výsledky
            <ul>
            <li>Percento výsledkov spojených s občianskymi návrhmi z celkového počtu výsledkov (celkový vplyv občanov na výstupy)</li>
            </ul>
            </li>
            </ul>

            <h3>Hybridizácia</h3>

            <p>Tento indikátor meria úroveň kombinácie medzi online a offline priestormi počas procesu.</p>

            <ul>
            <li>Je aktívny komponent stretnutí? (Áno=5, Nie=0)</li>
            <li>Konajú sa osobné stretnutia? (Áno=5, Nie=0)</li>
            <li>Konajú sa online stretnutia? (Áno=5, Nie=0)</li>
            <li>Konajú sa hybridné stretnutia? (Áno=5, Nie=0)</li>
            <li>Sú vytvorené návrhy zo stretnutí? (Áno=5, Nie=0)</li>
            </ul>

            <h3>Reakcieschopnosť</h3>

            <p>Tento indikátor meria úroveň reakcieschopnosti organizácie na podnety účastníkov. Odráža ich zapojenie prostredníctvom oficiálnych odpovedí a implementovaných rozhodnutí.</p>

            <ul>
            <li>Percento návrhov s odpoveďami (n/celkom) – Inštitucionálna reakcieschopnosť na návrhy</li>
            <li>Percento výsledkov dokončených na 100 % (n/celkom)</li>
            </ul>

            <h3>Sledovateľnosť</h3>

            <p>Tento indikátor meria transparentnosť a sledovateľnosť participatívneho procesu. Odráža, ako ľahko môžu účastníci sledovať vývoj návrhov a overovať inštitucionálne kroky prostredníctvom zverejnených záznamov.</p>

            <ul>
            <li>Počet návrhov s históriou (n/celkom)</li>
            <li>Percento výsledkov spojených s návrhmi (n/celkom)</li>
            <li>Percento uzavretých stretnutí so zverejnenou zápisnicou (n/celkom)</li>
            <li>Aktivácia modulu otvorených dát (dichotomické: 0 alebo 5)</li>
            <li>Percento návrhov súvisiacich s rozpočtami (n/celkom)</li>
            </ul>

            <br><br>
            <h3>Metriky sebahodnotenia</h3>

            <p>Okrem automatických metrík navrhujeme použiť <strong>formulár sebahodnotenia</strong> na posúdenie kvalitatívnych dimenzií každého participatívneho procesu. Tento formulár vyplnia administrátori platformy na konci každého procesu a odpovede sa verejne zobrazia v bloku obsahu indikátorov.</p>

            <p>Tieto otázky majú za cieľ zachytiť aspekty demokratickej kvality, ktoré nemožno posúdiť len prostredníctvom kvantitatívnych údajov. Je dôležité poznamenať, že odpovede na tento prieskum sú ovplyvnené názorom administrátorov platformy.</p>

            <br><br>
            <h3>Otázky sebahodnotenia</h3>

            <p>Otázky, ktoré tvoria formulár sebahodnotenia, na ktoré odpovedajú administrátori, ako aj hodnoty spojené s každou odpoveďou, sú uvedené nižšie.</p>

            <h4>Informatívnosť</h4>

            <ol>
            <li>Poskytujú zverejnené informácie jasnosť o mechanizmoch rozhodovania (napr. hlasovanie, konsenzus, priame rokovania)?
            <ul>
            <li>Žiadna jasnosť = 0</li>
            <li>Nízka jasnosť = 1</li>
            <li>Dostatočná jasnosť = 2,5</li>
            <li>Úplná jasnosť = 5</li>
            </ul>
            </li>
            <li>Boli poskytnuté informácie týkajúce sa schopnosti účastníkov ovplyvniť diskutovanú tému (ako v komunikácii procesu a pozvánkach, tak aj na začiatku každej diskusie)?
            <ul>
            <li>Nikdy = 0</li>
            <li>Takmer nikdy = 1</li>
            <li>Zvyčajne = 2,5</li>
            <li>Vždy = 5</li>
            </ul>
            </li>
            </ol>

            <h4>Vplyv občanov</h4>

            <ol>
            <li>Hodnotenie stupňa účasti v procese
            <ul>
            <li>Účastníci dostali informácie od organizácie. = 1</li>
            <li>Účastníci boli požiadaní konzultatívnym spôsobom alebo poskytli spätnú väzbu organizácii. = 2</li>
            <li>Účastníci boli zapojení do zdieľania rozhodovacej právomoci. = 3</li>
            <li>Účastníci boli rozhodujúcim spôsobom zapojení do rozhodovania. = 4</li>
            <li>Účastníci boli zapojení do rozhodovania a riadenia zdrojov alebo implementácie. = 5</li>
            </ul>
            </li>
            <li>Percento fáz s 0-5 rozhodovacím zásahom občanov.
            <p>Z celkového počtu fáz v procese (od výberu problémov po dohľad nad realizáciou), v koľkých má verejnosť možnosť prijímať rozhodnutia alebo vykonávať exekutívne kroky?</p>
            <ul>
            <li>0-20% = 1</li>
            <li>20-40% = 2</li>
            <li>40-60% = 3</li>
            <li>60-80% = 4</li>
            <li>80-100% = 5</li>
            </ul>
            </li>
            </ol>

            <h4>Inkluzívnosť</h4>

            <ol>
            <li>Ako sa hodnotí stupeň rozmanitosti aktérov a účastníkov vzhľadom na referenčnú populáciu v procese?
            <ul>
            <li>Žiadny = 0</li>
            <li>Nízky = 1</li>
            <li>Dostatočný = 2,5</li>
            <li>Dobrý = 5</li>
            </ul>
            </li>
            <li>V koľkých jazykoch bol proces komunikovaný?
            <ul>
            <li>Jeden jazyk = 1</li>
            <li>Menej ako polovica jazykov, ktorými sa hovorí v komunite = 2,5</li>
            <li>Viac ako polovica jazykov, ktorými sa hovorí v komunite = 5</li>
            </ul>
            </li>
            <li>Boli miesta osobných stretnutí prístupné pre osoby so zníženou pohyblivosťou?
            <ul>
            <li>Nie = 0</li>
            <li>Čiastočne = 2,5</li>
            <li>Áno = 5</li>
            </ul>
            </li>
            <li>Zasadnutia s účasťou boli naplánované na rôzne časy (ráno, napoludnie, popoludní, večer a cez víkendy).
            <ul>
            <li>Nie = 0</li>
            <li>Čiastočne = 2,5</li>
            <li>Áno = 5</li>
            </ul>
            </li>
            <li>Bola účastníkom ponúknutá digitálna podpora?
            <ul>
            <li>Nie = 0</li>
            <li>Čiastočne = 2,5</li>
            <li>Áno = 5</li>
            </ul>
            </li>
            </ol>
          title: Indikátory demokratickej kvality
