            announcement:
              body_html: |-
                <ul>
                <li>Tieto sa vypočítavajú automaticky z údajov Decidim. Budú viditeľné po zverejnení bloku obsahu.</li>
                <li>Tieto sú založené na vašich odpovediach v nasledujúcom formulári. Budú viditeľné po zodpovedaní všetkých otázok.</li>
                </ul>
              title: 'Tento blok obsahu obsahuje dva typy metrík:'
            citizen_influence:
              citizen_decisional_intervention:
                legend: Z celkového počtu fáz procesu (od výberu problémov až po dohľad nad realizáciou), v koľkých má verejnosť možnosť rozhodovať alebo vykonávať exekutívne kroky?
                options:
                  five: 80 - 100 %
                  four: 60 - 80 %
                  one: 0 - 20 %
                  three: 40 - 60 %
                  two: 20 - 40 %
              citizen_influence_level:
                legend: Do akej miery majú občania rozhodovaciu právomoc v tomto procese, od jednoduchého prijímania informácií až po rozhodujúce ovplyvňovanie rozhodnutí a riadenie zdrojov?
                options:
                  five: Účastníci boli zapojení do rozhodovania a riadenia zdrojov alebo implementácie
                  four: Účastníci boli rozhodujúcim spôsobom zapojení do rozhodovania
                  one: Účastníci dostali informácie od organizácie
                  three: Účastníci boli zapojení s cieľom zdieľať rozhodovaciu právomoc
                  two: Účastníci boli oslovení konzultačným spôsobom alebo poskytli spätnú väzbu organizácii
              name: Vplyv občanov
            inclusiveness:
              description: Inkluzívnosť podľa kultúrneho pôvodu a funkčnej rozmanitosti.
              digital_support_offered:
