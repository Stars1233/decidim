      static_pages:
        democratic_quality_indicators:
          content: |-
            <h2>Indikatorsystem för att mäta kvalitetsindikatorer i Decidim.</h2>
            <h3>Introduktion</h3>
            <p>Demokratisk kvalitet är en grundläggande princip i Decidim. För att upprätthålla detta har vi utvecklat ett system av indikatorer som hjälper till att utvärdera kvaliteten på deltagarprocesser på plattformen. Den här artikeln förklarar hur dessa indikatorer beräknas.</p>
            <h3>Hur beräknas indikatorerna?</h3>
            <p>Vi har definierat två metoder för att samla in kvalitetsindikatorer:</p>
            <ol>
            <li><strong>Automatiska mätvärden:</strong> Dessa beräknas direkt från data i Decidim-plattformen.</li>
            <li><strong>Självskattningsfrågor:</strong> Dessa baseras på ett formulär som fylls i av en administratör.</li>
            </ol>
            <p>Varje indikator uttrycks som en procentandel (n/totalt). Denna procentandel omvandlas sedan till ett betyg på en skala från 1 till 5:</p>
            <ul>
            <li>1 = 0–20%</li>
            <li>2 = 20–40%</li>
            <li>3 = 40–60%</li>
            <li>4 = 60–80%</li>
            <li>5 = 80–100%</li>
            </ul>
            <br><br>
            <h3>Automatiska mätvärden</h3>
            <p>Dessa mätvärden beräknas automatiskt från data som finns tillgänglig i Decidim. De utvärderas per deltagarprocess och kan göras offentliga av administratörer så att alla deltagare kan ta del av dem.</p>
            <p>Vi har definierat fyra huvudindikatorer: Medborgarinflytande, Hybridprocesser, Lyhördhet och Spårbarhet:</p>
            <h3>Medborgarinflytande</h3>
            <p>Denna indikator mäter nivån av medborgarinflytande på de godkända förslagen och processens utfall.</p>
            <ul>
            <li>
            Medborgarinflytande på förslag
            <ul>
            <li>Andel godkända förslag (n/totalt)</li>
            <li>Andel godkända <em>medborgar</em>förslag av totalt antal medborgarförslag (totalt medborgarinflytande på godkända förslag)</li>
            <li>Andel godkända medborgarförslag av totalt antal godkända förslag (relativt medborgarinflytande på godkända förslag)</li>
            </ul>
            </li>
            <li>
            Medborgarinflytande på resultat
            <ul>
            <li>Andel resultat kopplade till medborgarförslag av totalt antal resultat (totalt medborgarinflytande på resultat)</li>
            </ul>
            </li>
            </ul>
            <h3>Hybridprocesser</h3>
            <p>Denna indikator mäter graden av kombination mellan online- och offlineutrymmen under processen.</p>
            <ul>
            <li>Är en möteskomponent aktiv? (Ja=5, Nej=0)</li>
            <li>Finns det fysiska möten? (Ja=5, Nej=0)</li>
            <li>Finns det onlinemöten? (Ja=5, Nej=0)</li>
            <li>Finns det hybridmöten? (Ja=5, Nej=0)</li>
            <li>Finns det förslag skapade från möten? (Ja=5, Nej=0)</li>
            </ul>
            <h3>Lyhördhet</h3>
            <p>Denna indikator mäter organisationens lyhördhet gentemot deltagarnas bidrag. Den speglar deras engagemang genom officiella svar och genomförda beslut.</p>
            <ul>
            <li>Andel förslag med svar (n/totalt) – Institutionell lyhördhet för förslag</li>
            <li>Andel resultat slutförda till 100% (n/totalt)</li>
            </ul>
            <h3>Spårbarhet</h3>
            <p>Denna indikator mäter transparensen och spårbarheten i den deltagande processen. Den speglar hur enkelt deltagarna kan följa förslagets utveckling och verifiera institutionella åtgärder genom publicerade handlingar.</p>
            <ul>
            <li>Antal förslag med historik (n/totalt)</li>
            <li>Andel resultat kopplade till förslag (n/totalt)</li>
            <li>Andel möten avslutade med publicerade protokoll (n/totalt)</li>
            <li>Aktivering av öppna data-modulen (dikotomisk: 0 eller 5)</li>
            <li>Andel förslag kopplade till budgetar (n/totalt)</li>
            </ul>
            <br><br>
            <h3>Självskattningsmätvärden</h3>
            <p>Utöver automatiska mätvärden föreslår vi användning av ett <strong>självskattningsformulär</strong> för att bedöma de kvalitativa dimensionerna av varje deltagande process. Detta formulär fylls i av plattformsadministratörer i slutet av varje process, och svaren visas offentligt i indikatorernas innehållsblock.</p>
            <p>Dessa frågor syftar till att fånga aspekter av demokratisk kvalitet som inte kan bedömas enbart genom kvantitativa data. Det är viktigt att notera att svaren på denna enkät påverkas av plattformsadministratörernas egna uppfattningar.</p>
            <br><br>
            <h3>Självskattningsfrågor</h3>
            <p>Nedan redovisas de frågor som utgör självskattningsformuläret som besvaras av administratörerna, samt de värden som är kopplade till varje svar.</p>
            <h4>Informativitet</h4>
            <ol>
            <li>Ger den publicerade informationen tydlighet kring beslutsfattandets mekanismer (t.ex. omröstning, konsensus, direkta förhandlingar)?
            <ul>
            <li>Ingen tydlighet = 0</li>
            <li>Låg tydlighet = 1</li>
            <li>Tillräcklig tydlighet = 2,5</li>
            <li>Full tydlighet = 5</li>
            </ul>
            </li>
            <li>Har information lämnats om deltagarnas möjlighet att påverka det ämne som diskuteras (både i processens kommunikation och inbjudningar, samt i början av varje debattsession)?
            <ul>
            <li>Aldrig = 0</li>
            <li>Nästan aldrig = 1</li>
            <li>Vanligtvis = 2,5</li>
            <li>Alltid = 5</li>
            </ul>
            </li>
            </ol>
            <h4>Medborgarinflytande</h4>
            <ol>
            <li>Bedömning av graden av deltagande i processen
            <ul>
            <li>Deltagarna fick information från organisationen. = 1</li>
            <li>Deltagarna tillfrågades på ett rådgivande sätt eller gav återkoppling till organisationen. = 2</li>
            <li>Deltagarna involverades för att dela beslutandemakt. = 3</li>
            <li>Deltagarna involverades avgörande i beslutsfattandet. = 4</li>
            <li>Deltagarna involverades i beslutsfattandet och förvaltningen av resurser eller genomförandet. = 5</li>
            </ul>
            </li>
            <li>Andel faser med 0–5 medborgares beslutande inflytande.
            <p>Av alla faser i processen (från val av frågor till tillsyn av genomförandet), i hur många har allmänheten möjlighet att fatta beslut eller vidta verkställande åtgärder?</p>
            <ul>
            <li>0–20% = 1</li>
            <li>20–40% = 2</li>
            <li>40–60% = 3</li>
            <li>60–80% = 4</li>
            <li>80–100% = 5</li>
            </ul>
            </li>
            </ol>
            <h4>Inkludering</h4>
            <ol>
            <li>Hur bedöms graden av mångfald bland aktörer och deltagare i förhållande till referensbefolkningen i processen?
            <ul>
            <li>Ingen = 0</li>
            <li>Låg = 1</li>
            <li>Tillräcklig = 2,5</li>
            <li>God = 5</li>
            </ul>
            </li>
            <li>På hur många språk har processen kommunicerats?
            <ul>
            <li>Ett språk = 1</li>
            <li>Färre än hälften av de språk som talas i samhället = 2,5</li>
            <li>Fler än hälften av de språk som talas i samhället = 5</li>
            </ul>
            </li>
            <li>Var lokalerna för de fysiska mötena tillgängliga för personer med nedsatt rörlighet?
            <ul>
            <li>Nej = 0</li>
            <li>Delvis = 2,5</li>
            <li>Ja = 5</li>
            </ul>
            </li>
            <li>Deltagandesessionerna har schemalagts på varierande tider (morgon, middag, eftermiddag, kväll och helger).
            <ul>
            <li>Nej = 0</li>
            <li>Delvis = 2,5</li>
            <li>Ja = 5</li>
            </ul>
            </li>
            <li>Har digitalt stöd erbjudits till deltagarna?
            <ul>
            <li>Nej = 0</li>
            <li>Delvis = 2,5</li>
            <li>Ja = 5</li>
            </ul>
            </li>
            </ol>
          title: Demokratiska kvalitetsindikatorer
