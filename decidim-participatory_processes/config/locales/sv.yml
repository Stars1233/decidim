              body_html: |-
                <ul>
                <li>Dessa beräknas automatiskt från Decidim data. De kommer att bli synliga när du publicerar innehållsblocket.</li>
                <li>Dessa är baserade på dina svar i följande formulär. De kommer att synas när du har svarat på alla frågor.</li>
