            citizen_influence:
              citizen_decisional_intervention:
                legend: Under hur många av stegen i processen (från att lämna förslag till att visa genomförande) har allmänheten mandat att fatta beslut eller verkställa beslut?
                options:
                  five: 80 - 100%
                  four: 60 - 80%
                  one: 0 - 20%
                  three: 40 - 60%
                  two: 20 - 40%
              citizen_influence_level:
                legend: I vilken utsträckning har medborgarna beslutsmandat i processen, i allt från att bara ta emot information till att påverka beslut?
                options:
                  five: Deltagarna deltog i beslutsfattandet eller genomförandet
                  four: Deltagarna hade en beslutsfattande roll
                  one: Deltagare fick information från organisationen
                  three: Deltagarna var del i beslutsfattandet
                  two: Deltagarna var rådgivande eller gav synpunkter till organisationen
              name: Medborgarinflytande
            inclusiveness:
              description: Inkludering vad gäller kulturell bakgrund och funktionsvariationer.
              digital_support_offered:
                legend: Har deltagarna erbjudits digitalt stöd?
                options:
                  five: 'Ja'
                  two_five: Delvis
                  zero: 'Nej'
              functional_diversity_invited:
                legend: Hur är graden av mångfald hos processens aktörer och deltagare i relation till mångfalden hos de som påverkas av besluten?
                options:
                  five: Bra
                  one: Låg
                  two_five: Tillräcklig
                  zero: Obefintlig
              languages_communicated:
                legend: Hur många språk har använts i processen?
                options:
                  five: Mer än hälften av de språk som talas i upptagningsområdet
                  one: Ett språk
                  two_five: Mindre än hälften av de språk som talas i upptagningsområdet
              mobility_meeting_access:
                legend: Var möteslokalerna tillgängliga för personer med fysiska funktionsvariationer?
