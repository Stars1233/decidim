      static_pages:
        democratic_quality_indicators:
          content: |-
            <h2>Decidimにおける品質指標を測定するための指標システム</h2>

            <h3>はじめに</h3>
            <p>民主主義の質は、Decidimの中核的な理念です。この理念を堅持するため、私たちはプラットフォーム上の参加型プロセスの質を評価する指標システムを開発しました。本記事では、これらの指標がどのように算出されるかを解説します。</p>

            <h3>指標の算出方法</h3>
            <p>品質指標の収集方法として、以下の2つの手法を定義しています：</p>

            <ol>
            <li><strong>自動計測指標：</strong> Decidimプラットフォームのデータから直接算出される指標です。</li>
            <li><strong>自己評価質問：</strong> 管理者が記入するフォームに基づいて収集される指標です。</li>
            </ol>

            <p>各指標は割合（n/総数）で表されます。この割合は、1～5段階のスコアに変換されます：</p>

            <ul>
            <li>1 = 0～20%</li>
            <li>2 = 20～40%</li>
            <li>3 = 40～60%</li>
            <li>4 = 60～80%</li>
            <li>5 = 80～100%</li>
            </ul>

            <br><br>
            <h3>自動計測指標</h3>
            <p>これらの指標はDecidim内で利用可能なデータから自動的に算出されます。各参加型プロセスごとに評価され、管理者が公開設定を行うことで、すべての参加者が参照できるようになります。</p>

            <p>以下の4つの主要な指標を定義しています：市民の影響力、ハイブリッド性、応答性、追跡可能性：</p>

            <h3>市民の影響力</h3>

            <p>この指標は、受け入れられた提案やプロセスの成果物に対する市民の影響力の度合いを測定するものです。</p>

            <ul>
            <li>
            提案に対する市民の影響力
            <ul>
            <li>受け入れられた提案の割合（n/総数）</li>
            <li>市民提案全体に対する承認された<em>市民</em>提案の割合（承認された提案に対する市民の影響力の合計）</li>
            <li>承認された提案全体に対する市民提案の承認割合（承認された提案に対する市民の影響力の相対値）</li>
            </ul>
            </li>
            <li>
            成果物/結果に対する市民の影響力
            <ul>
            <li>結果全体のうち、市民提案に紐づく成果物の割合（成果物に対する市民の影響力の合計）</li>
            </ul>
            </li>
            </ul>

            <h3>ハイブリッドの実施状況</h3>

            <p>この指標は、オンライン空間とオフライン空間の融合度合いをプロセス全体を通じて測定するものです。</p>

            <ul>
            <li>ミーティングコンポーネントは有効化されていますか？（有効＝5点、無効＝0点）</li>
            <li>対面式のミーティングは実施されていますか？（実施＝5点、未実施＝0点）</li>
            <li>オンラインミーティングは実施されていますか？（実施＝5点、未実施＝0点）</li>
            <li>ハイブリッド型ミーティングは実施されていますか？（実施＝5点、未実施＝0点）</li>
            <li>ミーティングから提案が作成されていますか？（作成あり＝5点、作成なし＝0点）</li>
            </ul>

            <h3>組織の応答性</h3>

            <p>この指標は、組織が参加者からの意見に対してどの程度迅速かつ適切に対応できているかを測定します。公式な回答や実施された決定事項を通じて、組織の関与度合いを反映します。</p>

            <ul>
            <li>回答が得られた提案の割合（回答件数/総提案件数） - 組織の制度的応答性指標</li>
            <li>100%完了した成果物の割合（完了件数/総件数）</li>
            </ul>

            <h3>追跡可能性</h3>

            <p>この指標は、参加型プロセスの透明性と追跡可能性を測定します。参加者が提案の進捗状況を容易に追跡でき、公開された記録を通じて組織の対応内容を確認できるかどうかを反映します。</p>

            <ul>
            <li>履歴情報が記録されている提案の件数（履歴あり件数/総件数）</li>
            <li>提案に紐付けられた成果物の割合（紐付け件数/総件数）</li>
            <li>議事録が公開されて終了したミーティングの割合（議事録公開件数/総ミーティング件数）</li>
            <li>オープンデータモジュールの有効化状況（二値：0または5点）</li>
            <li>予算関連の提案の割合（予算関連件数/総件数）</li>
            </ul>

            <br><br>
            <h3>自己評価指標</h3>

            <p>自動生成される指標に加え、各参加型プロセスの質的側面を評価するため、<strong>自己評価フォーム</strong>の活用を提案します。このフォームは各プロセス終了後にプラットフォーム管理者が記入し、その回答内容は指標コンテンツブロック内で公開されます。</p>

            <p>これらの質問は、定量データだけでは評価できない民主的プロセスの質的側面を捉えることを目的としています。なお、この調査への回答はプラットフォーム管理者の主観的な見解に影響を受ける点にご留意ください。</p>

            <br><br>
            <h3>自己評価質問項目</h3>

            <p>管理者が回答する自己評価フォームの質問内容と、それぞれの回答に付与される評価値を以下に示します。</p>

            <h4>情報の有用性</h4>

            <ol>
            <li>公開された情報は、意思決定プロセス（投票、合意形成、直接交渉など）の仕組みを明確に説明していますか？
            <ul>
            <li>明確性なし = 0点</li>
            <li>やや明確性に欠ける = 1点</li>
            <li>十分な明確性がある = 2.5点</li>
            <li>完全に明確である = 5点</li>
            </ul>
            </li>
            <li>参加者が議論対象のテーマに対して影響を与える能力について、情報が提供されていますか（プロセスの告知や参加依頼時、および各討論セッションの開始時において）？
            <ul>
            <li>全く提供されていない = 0点</li>
            <li>ほとんど提供されていない = 1点</li>
            <li>通常提供されている = 2.5点</li>
            <li>常に提供されている = 5点</li>
            </ul>
            </li>
            </ol>

            <h4>市民の関与度合い</h4>

            <ol>
            <li>プロセスへの参加度合いの評価
            <ul>
            <li>参加者に対して組織から情報提供が行われた。 = 1</li>
            <li>参加者に対して協議的な形で意見聴取が行われた、または組織に対してフィードバックが提供された。 = 2</li>
            <li>意思決定権の共有を目的として参加者が関与した。 = 3</li>
            <li>意思決定プロセスにおいて参加者が決定的に関与した。 = 4</li>
            <li>参加者が意思決定と資源管理、または実施段階に関与した。 = 5</li>
            </ul>
            </li>
            <li>市民の意思決定介入が行われた段階の割合
            <p>問題選定から実施監督に至るまでの全プロセス段階のうち、市民が意思決定を行ったり、執行的な行動を取ることができる段階はどの程度ありますか？</p>
            <ul>
            <li>0-20% = 1</li>
            <li>20-40% = 2</li>
            <li>40-60% = 3</li>
            <li>60-80% = 4</li>
            <li>80-100% = 5</li>
            </ul>
            </li>
            </ol>

            <h4>包括性</h4>

            <ol>
            <li>プロセスにおける参照対象人口と比較して、関係者および参加者の多様性の度合いはどのように評価されますか？
            <ul>
            <li>該当なし = 0</li>
            <li>低い = 1</li>
            <li>十分である = 2.5</li>
            <li>良好である = 5</li>
            </ul>
            </li>
            <li>プロセスのコミュニケーションはどの程度の言語で行われましたか？
            <ul>
            <li>単一言語 = 1</li>
            <li>コミュニティで話されている言語の半数未満 = 2.5</li>
            <li>コミュニティで話されている言語の半数以上 = 5</li>
            </ul>
            </li>
            <li>対面ミーティングの開催場所は、移動に制限のある人々にとってアクセス可能でしたか？
            <ul>
            <li>いいえ = 0</li>
            <li>部分的に可能 = 2.5</li>
            <li>可能である = 5</li>
            </ul>
            </li>
            <li>参加セッションは多様な時間帯（午前・昼・午後・夜間・週末）に設定されましたか？
            <ul>
            <li>いいえ = 0</li>
            <li>部分的に可能 = 2.5</li>
            <li>可能である = 5</li>
            </ul>
            </li>
            <li>参加者に対してデジタルサポートが提供されましたか？
            <ul>
            <li>いいえ = 0</li>
            <li>部分的に提供 = 2.5</li>
            <li>提供された = 5</li>
            </ul>
            </li>
            </ol>
          title: 民主的品質指標
